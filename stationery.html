<!DOCTYPE html>
<html>
<head>
<title>Stationery - Silk Group</title>

<style>
body {
    font-family: Arial;
    margin: 0;

    /* PREMIUM BACKGROUND */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('background.jpg');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
.header {
    background: rgba(0,0,0,0.6);
    color: gold;
    padding: 15px;
    font-size: 22px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(10px);
}

.cart {
    background: gold;
    color: black;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: bold;
}

/* TITLE */
h1 {
    text-align: center;
    margin: 20px;
    color: gold;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 30px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
}

/* TEXT */
.price {
    color: gold;
    font-size: 18px;
    font-weight: bold;
}

/* BUTTONS */
button {
    margin: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.add {
    background: orange;
}

.buy {
    background: green;
    color: white;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    Silk Store 🛍️
    <div class="cart">Cart: <span id="cartCount">0</span></div>
</div>

<h1>Stationery Items</h1>

<div class="container">

<!-- PRODUCT 1 -->
<div class="card">
    <img src="pens.jpg" alt="Pens">
    <h3>Pens Pack</h3>
    <p class="price">₹50</p>
    <button class="add" onclick="addCart('Pens Pack')">Add to Cart</button>
    <button class="buy" onclick="buyNow('Pens Pack')">Buy Now</button>
</div>

<!-- PRODUCT 2 -->
<div class="card">
    <img src="notebooks.jpg" alt="Notebook">
    <h3>Notebook</h3>
    <p class="price">₹120</p>
    <button class="add" onclick="addCart('Notebook')">Add to Cart</button>
    <button class="buy" onclick="buyNow('Notebook')">Buy Now</button>
</div>

<!-- PRODUCT 3 -->
<div class="card">
    <img src="files.jpg" alt="Files">
    <h3>File Folder</h3>
    <p class="price">₹30</p>
    <button class="add" onclick="addCart('File Folder')">Add to Cart</button>
    <button class="buy" onclick="buyNow('File Folder')">Buy Now</button>
</div>

</div>

<script>

let cart = [];

function addCart(item){
    cart.push(item);
    document.getElementById("cartCount").innerText = cart.length;
    alert(item + " added to cart 🛒");
}

function buyNow(item){
    let number = "9491874711";
    let msg = "I want to buy: " + item;
    window.open("https://wa.me/" + number + "?text=" + encodeURIComponent(msg));
}

</script>

</body>
</html>
