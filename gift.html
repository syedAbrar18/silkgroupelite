<!DOCTYPE html>
<html>
<head>
    <title>Gift Items - Silk Group</title>

    <!-- IMPORTANT CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    Silk Store 🛍️
    <div class="cart">Cart: <span id="cartCount">0</span></div>
</div>

<!-- TITLE -->
<h1>Gift Items</h1>

<!-- PRODUCTS -->
<div class="container">

    <!-- ITEM 1 -->
    <div class="card">
        <img src="gift.jpg">
        <h3>Gift Combo</h3>
        <p class="price">₹500</p>
        <button class="add" onclick="addCart('Gift Combo')">Add to Cart</button>
        <button class="buy" onclick="buyNow('Gift Combo')">Buy Now</button>
    </div>

    <!-- ITEM 2 -->
    <div class="card">
        <img src="gift.jpg">
        <h3>Premium Gift Box</h3>
        <p class="price">₹800</p>
        <button class="add" onclick="addCart('Premium Gift')">Add to Cart</button>
        <button class="buy" onclick="buyNow('Premium Gift')">Buy Now</button>
    </div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
