<!DOCTYPE html>
<html>
<head>
    <title>Gift Items</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    Silk Store 🛍️
    <div class="cart">Cart: <span id="cartCount">0</span></div>
</div>

<h1>Gift Items</h1>

<div class="container">

    <div class="card">
        <img src="gift.jpg">
        <h3>Gift Combo</h3>
        <p class="price">₹500</p>
        <button class="add" onclick="addCart('Gift Combo')">Add to Cart</button>
        <button class="buy" onclick="buyNow('Gift Combo')">Buy Now</button>
    </div>

    <div class="card">
        <img src="gift.jpg">
        <h3>Premium Gift</h3>
        <p class="price">₹800</p>
        <button class="add" onclick="addCart('Premium Gift')">Add to Cart</button>
        <button class="buy" onclick="buyNow('Premium Gift')">Buy Now</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
