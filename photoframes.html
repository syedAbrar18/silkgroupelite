<!DOCTYPE html>
<html>
<head>
<title>Photo Frames</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
  <style>
body {
    font-family: Arial;
    margin: 0;

    /* PREMIUM BACKGROUND */
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('backgroundstationery.jpg');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
.header {
    background: rgba(0,0,0,0.6);
    color: gold;
    padding: 15px;
    font-size: 22px;
    display: flex;
    justify-content: space-between;
    backdrop-filter: blur(10px);
}

.cart {
    background: gold;
    color: black;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: bold;
}

/* TITLE */
h1 {
    text-align: center;
    margin: 20px;
    color: gold;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 30px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    color: white;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
}

/* TEXT */
.price {
    color: gold;
    font-size: 18px;
    font-weight: bold;
}

/* BUTTONS */
button {
    margin: 8px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.add {
    background: orange;
}

.buy {
    background: green;
    color: white;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    Silk Store 🛍️
    <div class="cart">Cart: <span id="cartCount">0</span></div>
</div>

<h1>Photo Frames</h1>

<div class="container">

<div class="card">
<img src="photoframe1.jpg">
<h3>photo Frame</h3>
<p class="price">₹300</p>
<button onclick="buyNow('Wooden Frame')">Buy</button>
</div>

<div class="card">
<img src="images/photoframes/photoframe2.jpg">
<h3>photo Frame</h3>
<p class="price">₹500</p>
<button onclick="buyNow('LED Frame')">Buy</button>
</div>

<div class="card">
<img src="images/photoframes/photoframe3.jpg">
<h3>Designer Frame</h3>
<p class="price">₹400</p>
<button onclick="buyNow('Designer Frame')">Buy</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
